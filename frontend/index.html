<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpecIt Document Sync</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Documents</h2>
                <div id="loading-spinner" class="spinner hidden"></div>
            </div>
            <ul id="document-list" class="doc-list">
            </ul>
        </aside>
        
        <main class="editor-area">
            <div class="editor-header">
                <h1 id="editor-title">Select a Document</h1>
                <div class="actions">
                    <button id="btn-cancel" class="btn btn-secondary" disabled>Cancel</button>
                    <button id="btn-save" class="btn btn-primary" disabled>Update & Sync</button>
                </div>
            </div>
            <div class="editor-content">
                <textarea id="document-editor" disabled placeholder="Document content will appear here..."></textarea>
            </div>
        </main>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
</body>
</html>
